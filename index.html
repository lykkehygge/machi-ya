<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>町屋の日 AR Experience</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <script>
      // ▼▼▼ スライドショーコンポーネント (自動中央配置＆フェード機能) ▼▼▼
      AFRAME.registerComponent('auto-slideshow', {
        schema: { 
          srcs: { type: 'array' }, 
          interval: { type: 'number', default: 3500 }
        },
        init: function () {
          this.el.setAttribute('src', this.data.srcs[0]);
          this.el.setAttribute('material', 'transparent: true; opacity: 1; shader: flat;');
          this.index = 0; 
          this.timer = null;
          
          const img = document.querySelector(this.data.srcs[0]);
          if (img.complete) {
            this.adjustSize(img);
          } else {
            img.onload = () => this.adjustSize(img);
          }
        },
        adjustSize: function(img) {
          // 画像の縦横比を計算し、ターゲット（幅1.0）の中心に常に配置する
          const w = img.naturalWidth;
          const h = img.naturalHeight;
          const maxSize = 1.0; 
          
          if (w > h) {
            this.el.setAttribute('width', maxSize);
            this.el.setAttribute('height', maxSize * (h / w));
          } else {
            this.el.setAttribute('width', maxSize * (w / h));
            this.el.setAttribute('height', maxSize);
          }
        },
        play: function() {
          if (this.timer) return;
          this.timer = setInterval(() => { this.nextSlide(); }, this.data.interval);
        },
        pause: function() {
          if (this.timer) clearInterval(this.timer);
          this.timer = null;
          this.el.setAttribute('material', 'opacity', 1);
        },
        nextSlide: function () {
          const el = this.el;
          
          el.setAttribute('animation', { property: 'material.opacity', from: 1, to: 0, dur: 800, easing: 'easeInOutQuad' });
          
          setTimeout(() => {
            this.index = (this.index + 1) % this.data.srcs.length;
            el.setAttribute('src', this.data.srcs[this.index]);
            
            const img = document.querySelector(this.data.srcs[this.index]);
            if(img.complete) {
                this.adjustSize(img);
            } else {
                img.onload = () => this.adjustSize(img);
            }
            
            el.removeAttribute('animation');
            el.setAttribute('animation', { property: 'material.opacity', from: 0, to: 1, dur: 800, easing: 'easeInOutQuad' });
          }, 800);
        }
      });

      // ▼▼▼ スマホ縦横回転時の表示崩れ修正 ▼▼▼
      window.addEventListener('orientationchange', () => {
        // 回転直後は画面サイズが確定していないため、少し遅らせてからリサイズを強制実行
        setTimeout(() => {
          window.dispatchEvent(new Event('resize'));
        }, 200);
      });
    </script>

    <style>
      /* 縦横回転対応の厳格なCSSリセット */
      html, body { 
        margin: 0; padding: 0; 
        width: 100%; height: 100%; 
        overflow: hidden; position: fixed; /* iOSのスクロールバウンス防止 */
        font-family: "Yu Mincho", "Hiragino Mincho ProN", serif; 
        background: #000; 
      }
      
      /* ローディング画面 */
      #loading { 
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
        background: radial-gradient(circle, #2a2a2a 0%, #000 100%); 
        z-index: 99999; display: flex; flex-direction: column; 
        justify-content: center; align-items: center; transition: opacity 0.8s ease-out; 
      }
      .loader { 
        width: 40px; height: 40px; 
        border: 1px solid rgba(255, 255, 255, 0.1); 
        border-top: 1px solid #fff; border-radius: 50%; 
        animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite; 
      }
      #loading-text { 
        margin-top: 25px; color: #fff; font-size: 11px; 
        letter-spacing: 4px; text-transform: uppercase; font-weight: 300; opacity: 0.8;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

      /* スキャンガイド (文言変更) */
      #scan-guide { 
        position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
        color: rgba(255,255,255,0.9); font-size: 14px; letter-spacing: 2px; 
        background: rgba(0,0,0,0.5); padding: 12px 24px; border-radius: 30px;
        backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.1);
        pointer-events: none; z-index: 8000; transition: opacity 0.5s ease;
        white-space: nowrap;
      }

      /* フッター (リンク削除・文言変更) */
      #footer-frame { 
        position: fixed; bottom: 0; left: 0; width: 100%; height: 80px; 
        background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); 
        display: flex; justify-content: center; align-items: center; 
        z-index: 9999; pointer-events: none; /* タッチ無効化 */
      }
      .footer-text { 
        color: #fff; font-size: 16px; letter-spacing: 6px; 
        font-weight: normal; text-shadow: 0 2px 6px rgba(0,0,0,0.8);
      }
    </style>
  </head>
  <body>

    <div id="loading"><div class="loader"></div><div id="loading-text">LOADING EXPERIENCE</div></div>
    <div id="scan-guide">パネルを映してください</div>
    <div id="footer-frame"><div class="footer-text">町屋の日</div></div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; uiError:yes; uiLoading:no; filterMinCF:0.0001; filterBeta: 0.001;" 
      color-space="sRGB" 
      renderer="colorManagement: true; antialias: true; highRefreshRate: true;" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <img id="s1-1" src="./s1-1.jpg" />
        <img id="s1-2" src="./s1-2.jpg" />
        <img id="s1-3" src="./s1-3.jpg" />
        
        <img id="s2-1" src="./s2-1.jpg" />
        <img id="s2-2" src="./s2-2.jpg" />
        <img id="s2-3" src="./s2-3.jpg" />
        
        <img id="s3-1" src="./s3-1.jpg" />
        <img id="s3-2" src="./s3-2.jpg" />
        <img id="s3-3" src="./s3-3.jpg" />
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-image id="slideshow-1" position="0 0 0" 
                 auto-slideshow="srcs: #s1-1, #s1-2, #s1-3; interval: 3500">
        </a-image>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 1">
        <a-image id="slideshow-2" position="0 0 0" 
                 auto-slideshow="srcs: #s2-1, #s2-2, #s2-3; interval: 3500">
        </a-image>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 2">
        <a-image id="slideshow-3" position="0 0 0" 
                 auto-slideshow="srcs: #s3-1, #s3-2, #s3-3; interval: 3500">
        </a-image>
      </a-entity>

    </a-scene>

    <script>
      const loadingDiv = document.getElementById('loading');
      const scanGuide = document.getElementById('scan-guide');
      const sceneEl = document.querySelector('a-scene');
      
      const slide1 = document.getElementById('slideshow-1');
      const slide2 = document.getElementById('slideshow-2');
      const slide3 = document.getElementById('slideshow-3');

      // ロード完了処理
      sceneEl.addEventListener('arReady', () => { hideLoading(); });
      sceneEl.addEventListener('arError', () => { hideLoading(); alert("カメラにアクセスできませんでした。"); });
      setTimeout(() => { hideLoading(); }, 10000);

      function hideLoading() {
        if(loadingDiv.style.display !== 'none') {
            loadingDiv.style.opacity = 0;
            setTimeout(() => { loadingDiv.style.display = 'none'; }, 800);
        }
      }

      // ガイド表示の切り替え
      let activeTargets = 0;
      function updateGuideVisibility() {
          scanGuide.style.opacity = activeTargets > 0 ? 0 : 1;
      }

      const targets = [
          { el: document.querySelector('[mindar-image-target="targetIndex: 0"]'), content: slide1 },
          { el: document.querySelector('[mindar-image-target="targetIndex: 1"]'), content: slide2 },
          { el: document.querySelector('[mindar-image-target="targetIndex: 2"]'), content: slide3 }
      ];

      targets.forEach(t => {
          if(!t.el) return;
          
          t.el.addEventListener('targetFound', () => {
              activeTargets++;
              updateGuideVisibility();
              if (t.content && t.content.components['auto-slideshow']) {
                  t.content.components['auto-slideshow'].play();
              }
          });
          
          t.el.addEventListener('targetLost', () => {
              activeTargets--;
              if(activeTargets < 0) activeTargets = 0;
              updateGuideVisibility();
              if (t.content && t.content.components['auto-slideshow']) {
                  t.content.components['auto-slideshow'].pause();
              }
          });
      });
    </script>
  </body>
</html>
