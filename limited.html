   <script> 
     // ★ここは必ず最新のGASウェブアプリURLに書き換えてください 

     const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwsGXnYIV9N-T8JslrfzniugTQMVOypvFXeOVjWYDAICm5DxyuHKQfFRRQUICsZXP6gRA/exec";

     var currentBooking = {}; 
     var currentCalendarDate = new Date(); 
     // 2026年6月以前の場合は初期表示を7月に固定（★変更箇所1） 
     if (currentCalendarDate.getFullYear() === 2026 && currentCalendarDate.getMonth() < 6) { 
       currentCalendarDate = new Date(2026, 6, 1); 
     } 
     var fullCalendarInstance = null; 
     var gDeadlineDate, gMaxAcceptDate, gHardEndDate; 

     var slideContainers = document.querySelectorAll('.slideshow-container, .hero-bg, .chef-slideshow'); 
     slideContainers.forEach(function(container) { 
       var slides = container.querySelectorAll('.slide'); 
       var currentSlide = 0; 
       if (slides.length > 1) { 
         setInterval(function() { 
           slides[currentSlide].classList.remove('active'); 
           currentSlide = (currentSlide + 1) % slides.length; 
           slides[currentSlide].classList.add('active'); 
         }, 4000); 
       } 
     }); 

     function toggleMap() { 
       var wrapper = document.getElementById('map-wrapper'); 
       var btn = document.getElementById('map-btn'); 
       if (wrapper.classList.contains('open')) { 
         wrapper.classList.remove('open'); 
         btn.innerText = 'Google mapで確認する'; 
       } else { 
         wrapper.classList.add('open'); 
         btn.innerText = '地図を閉じる'; 
       } 
     } 

     function adjustPeople(diff) { 
       var input = document.getElementById('input-people'); 
       var currentVal = parseInt(input.value) || 1; 
       var max = parseInt(input.max) || 6; 
       var newVal = currentVal + diff; 
       if(newVal >= 1 && newVal <= max) { 
         input.value = newVal; 
       } 
     } 

     document.addEventListener('DOMContentLoaded', function() { loadCalendarData(currentCalendarDate); }); 
     function goToToday() {  
       var d = new Date(); 
       // （★変更箇所2） 
       if (d.getFullYear() === 2026 && d.getMonth() < 6) { 
         currentCalendarDate = new Date(2026, 6, 1); 
       } else { 
         currentCalendarDate = d; 
       } 
       loadCalendarData(currentCalendarDate);  
     } 

     function changeMonth(diff) { currentCalendarDate.setDate(1); 
currentCalendarDate.setMonth(currentCalendarDate.getMonth() + diff); 
loadCalendarData(currentCalendarDate); } 

     function loadCalendarData(dateObj) { 
       document.getElementById('loading-overlay').style.display = 'flex'; 
       var yearMonthStr = dateObj.getFullYear() + "-" + ('0' + (dateObj.getMonth() + 1)).slice(-2); 

       document.getElementById('current-month-label').innerText = dateObj.getFullYear() + "年 " + (dateObj.getMonth() + 1) + "月"; 
       
       var baseDate = new Date(); 
       // （★変更箇所3） 
       if (baseDate.getFullYear() === 2026 && baseDate.getMonth() < 6) { 
         baseDate = new Date(2026, 6, 1); 
       } 

       document.getElementById('btn-prev-month').disabled = (dateObj.getFullYear() === baseDate.getFullYear() && dateObj.getMonth() === baseDate.getMonth()); 
       
       fetch(WEB_APP_URL + '?action=getCalendarData&yearMonth=' + yearMonthStr) 
         .then(function(response) { return response.json(); }) 
         .then(function(data) { renderCalendar(data); }) 
         .catch(function(error) { 
           console.error('Error:', error); 
           alert("カレンダーの読み込みに失敗しました。"); 
           document.getElementById('loading-overlay').style.display = 'none'; 
         }); 
     } 

     function renderCalendar(data) { 
       document.getElementById('loading-overlay').style.display = 'none'; 
       var eventsArray = []; 
       var today = new Date(); today.setHours(0,0,0,0); 
       
       gDeadlineDate = new Date(today);  
       gDeadlineDate.setDate(today.getDate() + (parseInt(data.deadlineDays) || 0)); 
       gMaxAcceptDate = new Date(today);  
       gMaxAcceptDate.setDate(today.getDate() + (parseInt(data.maxDays) || 60)); 
       gHardEndDate = new Date(data.endDate || "2099-12-31");  
       gHardEndDate.setHours(23,59,59); 

       var displayYear = parseInt(data.currentYearMonth.split('-')[0]); 
       var displayMonth = parseInt(data.currentYearMonth.split('-')[1]) - 1; 
       var dateInMonth = new Date(displayYear, displayMonth, 1); 
       
       var maxSeats = data.maxSeats || 6; 
       
       while(dateInMonth.getMonth() === displayMonth) { 

         var dateStr = dateInMonth.getFullYear() + '-' + ('0' + (dateInMonth.getMonth() + 1)).slice(-2) + '-' + ('0' + dateInMonth.getDate()).slice(-2); 
         
         // 追加: 制限の判定を2つに分割（未来の制限期間か、締切が過ぎたか） 
         var isFutureRestricted = (dateInMonth > gMaxAcceptDate) || (dateInMonth > gHardEndDate); 
         var isDeadlinePassed = (dateInMonth < gDeadlineDate); 
         
         // 未来の制限期間でなければイベントを描画（締切後の日付にも表示を出す） 
         if (!isFutureRestricted) { 
           // 「終日」の場合は1つの枠として2段で表示 
           if (data.holidayMap[dateStr] === "終日") { 
             eventsArray.push({ 
               title: 'Prep Day\n(開業準備)', 
               start: dateStr, 
               classNames: ['holiday-event', 'full-day-holiday'] 
             }); 
           } else { 
             // それ以外（個別枠）の場合は通常通り判定 
             ['昼', '夜'].forEach(function(slot) { 
               var slotKey = dateStr + '_' + slot; 
               var isHoliday = (data.holidayMap[slotKey] === "休業"); 

               if (isHoliday) { 
                 eventsArray.push({ title: slot + '：Prep Day', start: dateStr, classNames: ['holiday-event'] }); 
               } else { 
                 var booked = data.bookedCounts[slotKey] || 0; 
                 var remain = maxSeats - booked; 
                 
                 var titleText = slot + '：' + (remain > 0 ? '残' + remain : '満'); 
                 
                 // 予約締切を過ぎていて、かつ残席がある場合は「受付終了」とする 
                 if (isDeadlinePassed && remain > 0) { 
                   titleText = slot + '：受付終了'; 
                 } 

                 eventsArray.push({  
                   title: titleText,  
                   start: dateStr,  
                   // 締切を過ぎているか、満席の場合はグレーのイベントにする 
                   classNames: [(isDeadlinePassed || remain <= 0) ? 'full-event' : 'available-event'], 
                   extendedProps: { timeSlot: slot, remain: remain, restricted: isDeadlinePassed } 
                 }); 
               } 
             }); 
           } 
         } 
         dateInMonth.setDate(dateInMonth.getDate() + 1); 
       } 

       if (!fullCalendarInstance) { 
         fullCalendarInstance = new FullCalendar.Calendar(document.getElementById('calendar'), { 

           initialView: 'dayGridMonth', locale: 'ja', contentHeight: 'auto', headerToolbar: false, showNonCurrentDates: false, firstDay: 1, 
           dayCellClassNames: function(arg) { 
             if (!gDeadlineDate) return []; 
             // 締切日前であってもマスのグレーアウトはしない。未来の受付期間外のみグレーアウト 
             if (arg.date > gMaxAcceptDate || arg.date > gHardEndDate) return ['custom-restricted-day']; 
             return []; 
           }, 
           eventClick: function(info) { 

             if (info.event.extendedProps.restricted || !info.event.extendedProps.remain || info.event.extendedProps.remain <= 0) return; 

             currentBooking = { date: info.event.startStr, slot: info.event.extendedProps.timeSlot, remain: info.event.extendedProps.remain }; 
             document.getElementById('modal-header-text').innerText = currentBooking.date + " (" + currentBooking.slot + ")"; 
             var currentMax = Math.min(currentBooking.remain, 6); 
             document.getElementById('input-people').max = currentMax; 
             document.getElementById('max-people-label').innerText = currentMax; 
             document.getElementById('input-people').value = 1; 
             document.getElementById('res-modal').style.display = 'flex'; 
           } 
         }); 
         fullCalendarInstance.render(); 
       } 
       fullCalendarInstance.gotoDate(data.currentYearMonth + '-01'); 
       fullCalendarInstance.removeAllEvents(); 
       fullCalendarInstance.addEventSource(eventsArray); 
     } 

     function openDessertModal(date, time) { 
       currentBooking = { date: date, slot: time, remain: 6 }; 

       document.getElementById('modal-header-text').innerText = "デセールご予約" + currentBooking.date + " (" + currentBooking.slot + ")"; 
       var currentMax = 6; 
       document.getElementById('input-people').max = currentMax; 
       document.getElementById('max-people-label').innerText = currentMax; 
       document.getElementById('input-people').value = 1; 
       document.getElementById('res-modal').style.display = 'flex'; 
     } 

     function closeModal(id) { document.getElementById(id).style.display = 'none'; } 

     function openPwModal() {
       document.getElementById('secret-pw').value = '';
       document.getElementById('pw-modal').style.display = 'flex';
     }

     function checkPw() {
       var pw = document.getElementById('secret-pw').value;
       if (pw === "202611-ro") {
         window.location.href = "https://www.instagram.com/french__labo/";
       } else {
         alert("PWが異なります");
         document.getElementById('secret-pw').value = '';
       }
     }
     
     function submitReservation() { 
       var name = document.getElementById('input-name').value; 
       var phone = document.getElementById('input-phone').value; 
       var email = document.getElementById('input-email').value; 
       var people = parseInt(document.getElementById('input-people').value, 10); 
       var dislikes = document.getElementById('input-dislikes').value; 
       var allergies = document.getElementById('input-allergies').value; 
       var purpose = document.getElementById('input-purpose').value; 

       if(!name || !phone || !email || !people || !document.getElementById('agree-privacy').checked) { alert("必須項目を入力してください"); return; } 
       
       closeModal('res-modal'); 
       document.getElementById('loading-overlay').style.display = 'flex'; 
       
       var payload = {  
         date: currentBooking.date,  
         slot: currentBooking.slot,  
         name: name,  
         people: people,  
         email: email,  
         phone: phone,  
         purpose: purpose,  
         dislikes: dislikes,  
         allergy: allergies  
       }; 

       fetch(WEB_APP_URL, { 
         method: 'POST', 
         headers: { 'Content-Type': 'text/plain' }, 
         body: JSON.stringify(payload) 
       }) 
       .then(function(response) {  
         if (!response.ok) throw new Error('Network response was not ok'); 
         return response.json();  
       }) 
       .then(function(res) { 
         if(res.status === "OK") { 
           document.getElementById('msg-text').innerHTML = "予約が完了しました。"; 
           document.getElementById('msg-modal').style.display = 'flex'; 
           document.getElementById('input-name').value = ''; 
           document.getElementById('input-phone').value = ''; 
           document.getElementById('input-email').value = ''; 
           document.getElementById('input-purpose').value = ''; 
           document.getElementById('input-dislikes').value = ''; 
           document.getElementById('input-allergies').value = ''; 
           document.getElementById('agree-privacy').checked = false; 
           loadCalendarData(currentCalendarDate); 
         } else { alert("エラー: " + res.message); document.getElementById('loading-overlay').style.display = 'none'; } 
       }) 
       .catch(function(error) { 
         console.error('Error:', error); 
         alert("通信エラーが発生しました。ブラウザをリロードして再度お試しください。"); 
         document.getElementById('loading-overlay').style.display = 'none'; 
       }); 
     } 
   </script> 
 </body> 
 </html>
